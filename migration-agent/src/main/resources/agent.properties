# Migration Agent Configuration
# Override via environment variables: MIGRATION_AGENT_<KEY_UPPERCASE>
# e.g. MIGRATION_AGENT_KAFKA_BOOTSTRAP_SERVERS, MIGRATION_AGENT_MYSQL_DB_PASSWORD

# Kafka
kafka.bootstrap.servers=192.168.117.2:19092
kafka.consumer.group.id=migration-agent-group
kafka.topic.task-created=sync-task-created
kafka.topic.task-status=sync-task-status

# MySQL (workflow metadata)
mysql.db.url=jdbc:mysql://192.168.107.2:3306/sync_task_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
mysql.db.user=root
mysql.db.password=rootpassword

# H2 (local task state)
h2.metadata.user=sa
h2.metadata.password=

# Module JAR paths
jar.capture.path=migration-capture/target/migration-capture-1.0.0.jar
jar.migration-full.path=migration-full/target/migration-full-1.0.0.jar
jar.extract.path=migration-extract/target/migration-extract-1.0.0.jar
jar.increment.path=migration-increment/target/migration-increment-1.0.0.jar
jar.subscribe.path=migration-subscribe/target/migration-subscribe-1.0.0.jar

# Monitor intervals (ms)
monitor.capture.interval.ms=30000
monitor.increment.interval.ms=10000
monitor.progress.interval.ms=3000

# HTTP server
http.server.port=8083

# Retry policy (exponential backoff)
retry.max.attempts=5
retry.initial.delay.ms=5000
retry.multiplier=2.0
retry.max.delay.ms=300000

# Circuit breaker
circuit.breaker.failure.threshold=5

# Metrics persistence
metrics.persistence.flush.interval.ms=30000
metrics.persistence.batch.size=100
metrics.persistence.retention.days=30

# Backpressure control (extract → capture)
# extract 检测 THL 输出目录积压文件数超过高水位时，向 capture 发送 PAUSE 信号；
# 积压降到低水位以下时发送 RESUME 信号。建议 high > low，形成迟滞避免抖动。
backpressure.high.watermark=50
backpressure.low.watermark=20
# Backpressure signal check interval (ms)
backpressure.signal.check.interval.ms=1000

# Schema evolution (DDL auto-apply to target)
# DDL 应用策略：AUTO_APPLY（自动应用）/ SKIP（跳过所有 DDL）/ MANUAL（仅记录到日志）
schema.ddl.apply.policy=AUTO_APPLY
# 跨库类型转换开关（MySQL↔PostgreSQL DDL 自动翻译）
schema.cross.db.type.convert=true
# 需跳过的 DDL 子类型（逗号分隔），如 CREATE_DATABASE,DROP_DATABASE
schema.ddl.skip.subtypes=CREATE_DATABASE,DROP_DATABASE
# 人工 DDL 日志路径（MANUAL 策略或转换失败时记录）
schema.ddl.manual.log.path=logs/manual_ddl.log
# 数据库名映射：schema.mapping.db.<sourceDb>=<targetDb>
# schema.mapping.db.source_db=target_db
# 表名映射：schema.mapping.table.<sourceDb>.<sourceTable>=<targetDb>.<targetTable>
# schema.mapping.table.source_db.source_table=target_db.target_table
