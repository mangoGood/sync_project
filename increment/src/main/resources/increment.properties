# Input directory for THL files - unified output location
input.dir=../../output/thl

# Target MySQL connection properties
target.mysql.url=jdbc:mysql://192.168.107.7:3306/
target.mysql.user=root
target.mysql.password=rootpassword

# Scan interval for continuous mode (milliseconds)
scan.interval=5000

# Concurrent execution configuration
concurrent.mode=batch
concurrent.thread.pool.size=8
concurrent.batch.size=1000
concurrent.sql.timeout.seconds=30

# Pipeline configuration
pipeline.enabled=false
pipeline.filters=dbRenameFilter,tableRenameFilter,optimizeFilter,caseMappingFilter

# DatabaseRenameFilter - rename source database to target database
# mapping: source_db:target_db pairs (comma separated)
filter.dbRenameFilter.class=com.example.increment.filter.DatabaseRenameFilter
filter.dbRenameFilter.mapping=

# TableRenameFilter - rename source table to target table
# mapping: source_table:target_table or db.source_table:db.target_table (comma separated)
# mappingFile: path to a file with rename mappings (one per line, format: from=to or from:to)
filter.tableRenameFilter.class=com.example.increment.filter.TableRenameFilter
filter.tableRenameFilter.mapping=
filter.tableRenameFilter.mappingFile=

# OptimizeUpdateFilter - remove unchanged columns from UPDATE statements
filter.optimizeFilter.class=com.example.increment.filter.OptimizeUpdateFilter
filter.optimizeFilter.enabled=true

# CaseMappingFilter - transform case of schema/table/column names
# schemaCase: none/lower/upper
# tableCase: none/lower/upper
# columnCase: none/lower/upper
filter.caseMappingFilter.class=com.example.increment.filter.CaseMappingFilter
filter.caseMappingFilter.schemaCase=none
filter.caseMappingFilter.tableCase=none
filter.caseMappingFilter.columnCase=none

# Source MySQL version - affects SQL generation compatibility
# Supported values: 5.6, 5.7, 8.0
# This controls version-specific SQL syntax handling in the sync pipeline
source.mysql.version=8.0

# Target MySQL version - affects SQL execution compatibility
# Supported values: 5.6, 5.7, 8.0
target.mysql.version=8.0
