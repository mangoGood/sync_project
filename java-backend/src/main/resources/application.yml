server:
  port: 8082

spring:
  application:
    name: sync-task-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://192.168.107.2:3306/sync_task_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:rootpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: 192.168.117.2:19092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: sync-task-group
      task-created-group-id: task-created-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.synctask.dto"
    topics:
      task-created: sync-task-created
      task-status: sync-task-status

  security:
    user:
      name: admin
      password: admin

jwt:
  secret: ${JWT_SECRET:synctask-secret-key-very-long-string-for-jwt-token-generation-and-validation-2024}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  task:
    file-base-path: ./files
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8082,http://localhost:3000}

logging:
  level:
    com.synctask: INFO
    org.springframework.security: INFO
